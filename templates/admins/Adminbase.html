<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Automated Data Analyser</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #E0F7FA, #FFF8E1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #2e2e2e;
      position: relative;
      overflow-x: hidden;
    }

    /* SAME BACKGROUND */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.simplilearn.com/ice9/free_resources_article_thumb/data_analyticstrendsmin.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.25;
      z-index: -1;
    }

    /* NAVBAR MATCHED */
    header {
      background: #06080c;
      padding: 1.2rem 2rem;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      max-width: 1200px;
      margin: 0 auto;
    }

    .navbar h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 0.5rem;

      white-space: nowrap;
    }

    .navbar h1::before {
      content: '🛠️';
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 0.6rem;
      margin-left: auto;
    }

    .navbar ul li a {
      text-decoration: none;
      color: #06080c;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
      border-radius: 10px;
      background: #ffffff;
      transition: all 0.3s ease;

      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .navbar ul li a:hover {
      background: #b2b5e6;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    /* CONTENT */
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      flex: 1;
    }

    .content-placeholder {
      background: rgba(255, 255, 255, 0.9);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(6px);
    }

    footer {
      text-align: center;
      background: #06080c;
      color: white;
      padding: 1rem;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        align-items: center;
      }

      .navbar ul {
        flex-direction: column;
        margin-left: 0;
      }

      .navbar h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="navbar">
      <h1>Admin Dashboard</h1>

      <ul>
        <li>
          <a href="{% url 'AdminHome' %}">
            <i class="fas fa-home"></i> Home
          </a>
        </li>
        <li>
          <a href="{% url 'RegisterUsersView' %}">
            <i class="fas fa-users"></i> Users
          </a>
        </li>
        <li>
          <a href="{% url 'base' %}">
            <i class="fas fa-sign-out-alt"></i> Logout
          </a>
        </li>
      </ul>
    </div>
  </header>

  <div class="container">
    <div class="content-placeholder">
      {% block content %}
      {% endblock %}
    </div>
  </div>

  <footer>
    <p>© 2025 Automated Data Analyser using Generative AI. All rights reserved.</p>
  </footer>
</body>
</html>
